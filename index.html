<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confesiones con Carlos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#FEDD00;
overflow-x:hidden;
color:white;
}

/* ===== FONDO BOLITAS ===== */

.floating-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.floating-bg span{
position:absolute;
width:18px;
height:18px;
background:linear-gradient(45deg,#111,#333);
border-radius:50%;
opacity:.5;
filter:blur(1px);
animation:freeBall 20s ease-in-out infinite alternate;
}

.floating-bg span:nth-child(1){top:10%;left:20%;animation-duration:18s;}
.floating-bg span:nth-child(2){top:70%;left:15%;animation-duration:22s;}
.floating-bg span:nth-child(3){top:40%;left:80%;animation-duration:20s;}
.floating-bg span:nth-child(4){top:80%;left:60%;animation-duration:24s;}
.floating-bg span:nth-child(5){top:30%;left:50%;animation-duration:19s;}
.floating-bg span:nth-child(6){top:60%;left:75%;animation-duration:23s;}

@keyframes freeBall{
0%{transform:translate(0,0);}
25%{transform:translate(200px,-150px);}
50%{transform:translate(-180px,120px);}
75%{transform:translate(150px,180px);}
100%{transform:translate(-120px,-100px);}
}

/* ===== PANEL ===== */

.container{
background:#111;
border-radius:25px;
padding:20px;
text-align:center;
max-width:420px;
margin:80px auto;
box-shadow:
0 20px 50px rgba(0,0,0,.6),
0 0 25px rgba(254,221,0,.25);
}

/* ===== FOTO ===== */

.profile-wrapper{
display:flex;
justify-content:center;
margin-top:-60px;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #FEDD00;
object-fit:cover;
background:#fff;
transition:.3s;
cursor:pointer;
}

.profile-img:hover{
transform:scale(1.08);
box-shadow:0 0 25px #FEDD00;
}

/* ===== TEXTOS ===== */

h1{
font-size:30px;
margin:15px 0 5px;
}

.subtitle{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
color:#FEDD00;
}

.creator-text{
font-size:15px;
opacity:.9;
min-height:24px;
margin-bottom:15px;
}

/* ===== VIDEO ===== */

.video{
margin:15px 0;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

iframe{
width:100%;
height:200px;
border:none;
}

/* ===== BOTONES ===== */

.social{
display:flex;
flex-direction:column;
gap:10px;
}

.btn-social{
padding:12px;
border-radius:25px;
text-decoration:none;
color:white;
font-weight:bold;
display:flex;
justify-content:center;
gap:10px;
transition:.3s;
}

/* INSTAGRAM */
.instagram{background:linear-gradient(90deg,#ff3cac,#d85eff);}
.instagram:hover{transform:scale(1.05);box-shadow:0 0 20px #ff3cac;}

/* FACEBOOK */
.facebook{background:linear-gradient(90deg,#2f7fff,#54d2ff);}
.facebook:hover{transform:scale(1.05);box-shadow:0 0 20px #2f7fff;}

/* TIKTOK */
.tiktok{background:linear-gradient(90deg,#000,#333);}
.tiktok:hover{transform:scale(1.05);box-shadow:0 0 20px #fff;}

/* YOUTUBE */
.youtube{background:linear-gradient(90deg,#ff0000,#ff3b3b);}
.youtube:hover{transform:scale(1.05);box-shadow:0 0 25px #ff0000;}

/* HISTORIA */
.historia{background:linear-gradient(90deg,#ff3cac,#ff6b6b);}
.historia:hover{transform:scale(1.05);box-shadow:0 0 25px #ff3cac;}

/* SHOP */
.shop{
background:#111;
border:2px solid #FEDD00;
color:#FEDD00;
}
.shop:hover{
transform:scale(1.05);
background:#FEDD00;
color:#111;
box-shadow:0 0 30px #FEDD00;
}

</style>
</head>

<body>

<div class="floating-bg">
<span></span><span></span><span></span>
<span></span><span></span><span></span>
</div>

</body>
</html>
