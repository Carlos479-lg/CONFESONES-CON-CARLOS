<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos | Creator Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#FEDD00;
overflow-x:hidden;
color:white;
}

/* PANEL */

.container{
background:#111111;
border-radius:30px;
padding:25px;
text-align:center;
max-width:420px;
margin:60px auto;
box-shadow:
0 25px 60px rgba(0,0,0,.6),
0 0 30px rgba(254,221,0,.25);
}

/* FOTO */

.profile-wrapper{
display:flex;
justify-content:center;
margin-top:-70px;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #FEDD00;
object-fit:cover;
background:#fff;
}

/* TEXTOS */

h1{
font-size:32px;
margin:20px 0 5px;
}

.subtitle{
font-size:18px;
color:#FEDD00;
margin-bottom:10px;
}

/* VIDEO */

.video{
margin:20px 0;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

iframe{
width:100%;
height:220px;
border:none;
}

/* BOTONES */

.social{
display:flex;
flex-direction:column;
gap:12px;
}

.btn-social{
padding:14px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
transition:.3s;
box-shadow:0 6px 15px rgba(0,0,0,.5);
}

.btn-social:hover{
transform:scale(1.05);
}

/* INSTAGRAM */
.instagram{
background:linear-gradient(90deg,#ff3cac,#d85eff);
}

/* FACEBOOK */
.facebook{
background:linear-gradient(90deg,#2f7fff,#54d2ff);
}

/* TIKTOK */
.tiktok{
background:linear-gradient(90deg,#000,#333);
}

/* YOUTUBE */
.youtube{
background:linear-gradient(90deg,#ff0000,#ff3b3b);
}

/* ENVIAR HISTORIA */
.historia{
background:linear-gradient(90deg,#ff3cac,#ff6b6b);
}

/* SHOP */
.shop{
background:#111;
border:2px solid #FEDD00;
color:#FEDD00;
box-shadow:0 0 20px rgba(254,221,0,.4);
}

.shop:hover{
background:#FEDD00;
color:#111;
}

</style>
</head>

<body>

<div class="container">

<div class="profile-wrapper">
<img class="profile-img"
src="https://raw.githubusercontent.com/aalvarez6236-ux/PAGINA-LINK-BIO/main/cd92f946-3978-4fbc-b4e7-9f0fc1008f44.png">
</div>

<h1>Hola, soy Carlos 🚀</h1>
<p class="subtitle">Bienvenido a mi mundo.</p>

<div class="video">
<iframe src="https://www.youtube.com/embed/Pkvwv_Q50tk" allowfullscreen></iframe>
</div>

<div class="social">

<a class="btn-social instagram" 
href="https://www.instagram.com/stories/soywandercarlos/" 
target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn-social facebook" 
href="https://www.facebook.com/profile.php?id=61585120763674" 
target="_blank">
<i class="fab fa-facebook-f"></i> Facebook
</a>

<a class="btn-social tiktok" 
href="https://www.tiktok.com/@soywandercarlos" 
target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a class="btn-social youtube" 
href="https://www.youtube.com/@ConfesionesConCarlos/" 
target="_blank">
<i class="fab fa-youtube"></i> YouTube
</a>

<a class="btn-social historia" 
href="mailto:ConfesioneConCarlos@gmail.com?subject=Quiero enviarte mi historia" 
target="_blank">
<i class="fas fa-envelope"></i> Enviar tu historia
</a>

<a class="btn-social shop" 
href="#AQUI_PON_LINK_DEL_SHOP" 
target="_blank">
<i class="fas fa-bag-shopping"></i> Explorar colección
</a>

</div>

</div>

</body>
</html>
